<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onboarding – KS1 ALKEBULAN PAY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-blue: #001A3D;
      --gold: #D4AF37;
      --bg: #050A16;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      background: var(--bg) url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='1' fill='%23D4AF37' opacity='0.3'/%3E%3Ccircle cx='120' cy='30' r='0.8' fill='%23fff' opacity='0.4'/%3E%3Ccircle cx='180' cy='150' r='0.6' fill='%23D4AF37' opacity='0.2'/%3E%3Ccircle cx='20' cy='180' r='0.9' fill='%23fff' opacity='0.3'/%3E%3C/svg%3E") repeat;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 60px auto;
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      color: var(--gold);
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 16px;
    }
    input::placeholder {
      color: #aaa;
    }
    button {
      background: linear-gradient(145deg, #ffd700, #b8860b);
      color: var(--deep-blue);
      border: none;
      padding: 16px 36px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 18px;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .error {
      color: #ff6b6b;
      margin: 15px 0;
      text-align: center;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--gold);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Business Onboarding</h1>
    <div id="error" class="error"></div>
    
    <form id="onboardingForm">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="e.g., Kwame Asante" required>
      </div>
      <div class="form-group">
        <label for="phone">WhatsApp Phone (+233...)</label>
        <input type="tel" id="phone" placeholder="+233240000000" required>
      </div>
      <div class="form-group">
        <label for="wallet">Wallet Address (Optional)</label>
        <input type="text" id="wallet" placeholder="0x...">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit">Submit Application</button>
    </form>

    <a href="/" class="back-link">← Back to Home</a>
  </div>

  <script>
    document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value;
      const phone = document.getElementById('phone').value;
      const wallet = document.getElementById('wallet').value;
      const password = document.getElementById('password').value;

      try {
        // Step 1: Create account
        let res = await fetch('https://ks1-sme-onboarding-system.onrender.com/api/onboarding/create-account', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, phone, wallet, password })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || 'Failed to create account');
        }
        const data1 = await res.json();

        // Step 2: Create SME profile
        res = await fetch('https://ks1-sme-onboarding-system.onrender.com/api/onboarding/create-sme-profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: data1.userId,
            businessName: `${fullName} Business`,
            businessType: 'Entrepreneur',
            industry: 'General',
            country: 'Ghana',
            city: 'Accra',
            address: 'Not specified'
          })
        });

        if (!res.ok) throw new Error('Failed to create business profile');
        const data2 = await res.json();

        // Step 3: Submit onboarding
        await fetch('https://ks1-sme-onboarding-system.onrender.com/api/onboarding/submit-onboarding', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ smeId: data2.smeId })
        });

        alert('✅ Your application has been submitted! You will be contacted via WhatsApp.');
        window.location.href = '/';
      } catch (err) {
        document.getElementById('error').textContent = err.message;
      }
    });
  </script>
</body>
</html>
